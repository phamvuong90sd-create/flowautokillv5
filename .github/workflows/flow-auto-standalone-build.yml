name: Build FlowAuto Standalone

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/flow_auto_standalone/**'
      - '.github/workflows/flow-auto-standalone-build.yml'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/flow_auto_standalone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: rm -rf .venv-build && python -m venv .venv-build
      - run: ./.venv-build/bin/python -m pip install -U pip
      - run: ./.venv-build/bin/python -m pip install -r requirements.txt
      - run: ./.venv-build/bin/python -m PyInstaller --noconfirm --onefile --name FlowAutoStandalone --icon assets/icon.png --hidden-import certifi --collect-data certifi --add-data "payload/scripts:payload/scripts" --add-data "assets/subscription_qr.png:assets" --add-data "assets/subscription_qr_bank.png:assets" --collect-submodules urllib --collect-all playwright --collect-all google main.py
      - run: mkdir -p out && cp -f dist/FlowAutoStandalone out/FlowAutoStandalone-linux
      - uses: actions/upload-artifact@v4
        with:
          name: FlowAutoStandalone-linux
          path: apps/flow_auto_standalone/out/FlowAutoStandalone-linux

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/flow_auto_standalone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: if (Test-Path .venv-build) { Remove-Item -Recurse -Force .venv-build }
        shell: pwsh
      - run: python -m venv .venv-build
        shell: pwsh
      - run: .\.venv-build\Scripts\python -m pip install -U pip
        shell: pwsh
      - run: .\.venv-build\Scripts\python -m pip install -r requirements.txt
        shell: pwsh
      - run: .\.venv-build\Scripts\python -m PyInstaller --noconfirm --onefile --windowed --name FlowAutoStandalone --icon assets/icon.ico --hidden-import certifi --collect-data certifi --add-data "payload/scripts;payload/scripts" --add-data "assets/subscription_qr.png;assets" --add-data "assets/subscription_qr_bank.png;assets" --collect-submodules urllib --collect-all playwright --collect-all google main.py
        shell: pwsh
      - run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item -Force dist\FlowAutoStandalone.exe out\FlowAutoStandalone-windows.exe
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: FlowAutoStandalone-windows
          path: apps/flow_auto_standalone/out/FlowAutoStandalone-windows.exe

  build-macos:
    # Build universal2 app to run on both Intel and Apple Silicon Macs
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/flow_auto_standalone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: rm -rf .venv-build && python3 -m venv .venv-build
      - run: ./.venv-build/bin/python -m pip install -U pip
      - run: ./.venv-build/bin/python -m pip install -r requirements.txt
      - run: |
          mkdir -p payload/node/macos/x64 payload/node/macos/arm64 .tmp-node
          curl -L https://nodejs.org/dist/v20.19.1/node-v20.19.1-darwin-x64.tar.gz -o .tmp-node/node-x64.tgz
          curl -L https://nodejs.org/dist/v20.19.1/node-v20.19.1-darwin-arm64.tar.gz -o .tmp-node/node-arm64.tgz
          tar -xzf .tmp-node/node-x64.tgz -C .tmp-node
          tar -xzf .tmp-node/node-arm64.tgz -C .tmp-node
          cp -f .tmp-node/node-v20.19.1-darwin-x64/bin/node payload/node/macos/x64/node
          cp -f .tmp-node/node-v20.19.1-darwin-arm64/bin/node payload/node/macos/arm64/node
          chmod +x payload/node/macos/x64/node payload/node/macos/arm64/node
      - run: ./.venv-build/bin/python -m PyInstaller --noconfirm --windowed --target-arch universal2 --name FlowAutoStandalone --icon assets/icon.icns --hidden-import certifi --collect-data certifi --add-data "payload/scripts:payload/scripts" --add-data "payload/node:payload/node" --add-data "assets/subscription_qr.png:assets" --add-data "assets/subscription_qr_bank.png:assets" --collect-submodules urllib --collect-all playwright --collect-all google main.py
      - run: |
          mkdir -p out
          ditto -c -k --sequesterRsrc --keepParent dist/FlowAutoStandalone.app out/FlowAutoStandalone-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: FlowAutoStandalone-macos
          path: apps/flow_auto_standalone/out/FlowAutoStandalone-macos.zip

  summary:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - run: 'echo "Build complete: linux + windows + macos artifacts ready."'

